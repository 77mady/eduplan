<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Analizzatore PDF</title>
</head>
<body>
    <h1>Carica il PDF per l'analisi</h1>
    
    <input type="file" id="pdfInput" accept="application/pdf">
    <button onclick="uploadAndAnalyze()">Analizza PDF</button>
    
    <p id="statusMessage"></p>

    <script>
        async function uploadAndAnalyze() {
            const fileInput = document.getElementById('pdfInput');
            const status = document.getElementById('statusMessage');
            
            if (fileInput.files.length === 0) {
                alert("Seleziona un file PDF!");
                return;
            }

            status.innerText = "Analisi in corso, attendi...";
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                const base64Data = e.target.result.split(',')[1];

                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fileData: base64Data,
                            prompt: "Analizza questo documento e riassumi le priorità operative."
                        })
                    });

                    const result = await response.json();
                    
                    if (response.ok) {
                        status.innerText = "Risultato: " + result.text;
                    } else {
                        status.innerText = "Errore dal server: " + result.error;
                    }
                } catch (error) {
                    status.innerText = "Errore di connessione: " + error.message;
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
