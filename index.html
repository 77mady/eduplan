<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Progetto PTOF</title>
</head>
<body>
    <h1>Benvenuta nel PTOF</h1>
    
    <div>
        <input type="file" id="pdfInput" accept="application/pdf">
        <button onclick="uploadAndAnalyze()">Analizza PDF</button>
    </div>
    
    <div id="statusMessage" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        async function uploadAndAnalyze() {
            const fileInput = document.getElementById('pdfInput');
            const status = document.getElementById('statusMessage');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                alert("Seleziona prima un file PDF.");
                return;
            }

            status.innerText = "Elaborazione in corso, attendi...";
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                const base64Data = e.target.result.split(',')[1];

                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fileData: base64Data,
                            prompt: "Analizza questo documento PTOF."
                        })
                    });

                    const result = await response.json();
                    
                    if (response.ok) {
                        status.innerText = "Risultato: " + result.text;
                    } else {
                        status.innerText = "Errore: " + result.error;
                    }
                } catch (error) {
                    status.innerText = "Errore di connessione.";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
